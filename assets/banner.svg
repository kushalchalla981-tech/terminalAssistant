<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" width="960" height="280">
  <defs>
    <!-- Wood grain base -->
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A1A0E"/>
      <stop offset="30%"  stop-color="#1E1208"/>
      <stop offset="70%"  stop-color="#231509"/>
      <stop offset="100%" stop-color="#180E05"/>
    </linearGradient>

    <!-- Grain lines filter -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9 0.02" numOctaves="4" seed="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Stamp/burn distress filter -->
    <filter id="burn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="5" seed="8" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Gold foil gradient -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F5DEB3"/>
      <stop offset="25%"  stop-color="#D4A84B"/>
      <stop offset="50%"  stop-color="#F0C040"/>
      <stop offset="75%"  stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#D4A84B"/>
    </linearGradient>

    <!-- Faded parchment gradient for subtitle -->
    <linearGradient id="parch" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2A1A0E" stop-opacity="1"/>
      <stop offset="15%"  stop-color="#C8A96E" stop-opacity="1"/>
      <stop offset="85%"  stop-color="#C8A96E" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2A1A0E" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background panel -->
  <rect width="960" height="280" rx="6" ry="6" fill="url(#wood)"/>

  <!-- Wood grain overlay -->
  <rect width="960" height="280" rx="6" ry="6" fill="url(#wood)" filter="url(#grain)" opacity="0.5"/>

  <!-- Outer decorative border — double rule -->
  <rect x="12" y="12" width="936" height="256" rx="4" ry="4"
        fill="none" stroke="#7A5230" stroke-width="1.5" opacity="0.8"/>
  <rect x="18" y="18" width="924" height="244" rx="3" ry="3"
        fill="none" stroke="#5C3A1C" stroke-width="0.8" opacity="0.6"/>

  <!-- Corner ornaments — four corners -->
  <!-- TL -->
  <text x="22" y="44" font-family="serif" font-size="28" fill="#8B6030" opacity="0.9">✦</text>
  <!-- TR -->
  <text x="910" y="44" font-family="serif" font-size="28" fill="#8B6030" opacity="0.9">✦</text>
  <!-- BL -->
  <text x="22" y="262" font-family="serif" font-size="28" fill="#8B6030" opacity="0.9">✦</text>
  <!-- BR -->
  <text x="910" y="262" font-family="serif" font-size="28" fill="#8B6030" opacity="0.9">✦</text>

  <!-- Top rule ornament -->
  <line x1="60" y1="40" x2="440" y2="40" stroke="#6B4226" stroke-width="0.8" opacity="0.7"/>
  <line x1="520" y1="40" x2="900" y2="40" stroke="#6B4226" stroke-width="0.8" opacity="0.7"/>
  <text x="475" y="47" font-family="serif" font-size="14" fill="#8B6030" text-anchor="middle" opacity="0.8">◆</text>

  <!-- Bottom rule ornament -->
  <line x1="60" y1="245" x2="440" y2="245" stroke="#6B4226" stroke-width="0.8" opacity="0.7"/>
  <line x1="520" y1="245" x2="900" y2="245" stroke="#6B4226" stroke-width="0.8" opacity="0.7"/>
  <text x="475" y="252" font-family="serif" font-size="14" fill="#8B6030" text-anchor="middle" opacity="0.8">◆</text>

  <!-- Subtle horizontal burn lines across wood -->
  <line x1="0" y1="68"  x2="960" y2="68"  stroke="#0A0602" stroke-width="0.4" opacity="0.4"/>
  <line x1="0" y1="130" x2="960" y2="130" stroke="#0A0602" stroke-width="0.4" opacity="0.3"/>
  <line x1="0" y1="192" x2="960" y2="192" stroke="#0A0602" stroke-width="0.4" opacity="0.4"/>

  <!-- Main title — TERMINAL burned into wood in gold -->
  <text
    x="480" y="155"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="108"
    font-weight="bold"
    letter-spacing="18"
    text-anchor="middle"
    fill="url(#gold)"
    filter="url(#burn)"
    opacity="0.95"
  >TERMINAL</text>

  <!-- Shadow layer for depth -->
  <text
    x="483" y="158"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="108"
    font-weight="bold"
    letter-spacing="18"
    text-anchor="middle"
    fill="#0A0602"
    opacity="0.35"
  >TERMINAL</text>

  <!-- Subtitle band -->
  <rect x="280" y="196" width="400" height="26" rx="2" fill="url(#parch)" opacity="0.9"/>

  <!-- Subtitle text -->
  <text
    x="480" y="215"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="13"
    letter-spacing="8"
    text-anchor="middle"
    fill="#1C0F05"
    font-weight="bold"
  >A S S I S T A N T</text>

  <!-- Tagline -->
  <text
    x="480" y="238"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="10"
    letter-spacing="4"
    text-anchor="middle"
    fill="#7A5230"
    opacity="0.85"
    font-style="italic"
  >est. 2024  ·  runs local  ·  no cloud  ·  no compromise</text>
</svg>
